<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 문자 인코딩을 UTF-8로 설정 -->
  <meta charset="UTF-8">
  <!-- 모바일 기기에서 화면 크기에 맞게 표시 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 브라우저 탭에 표시될 제목 -->
  <title>내 이야기를 들어줘! - 24시간 심리 상담</title>
  <!-- 파비콘 (브라우저 탭 아이콘) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- CSS 스타일 파일 연결 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== 헤더 영역 ========== -->
  <!-- 페이지 상단에 로고와 부제목을 표시하는 영역 -->
  <header class="header">
    <h1 class="header__title">내 이야기를 들어줘!</h1>
    <p class="header__subtitle">24시간 당신의 이야기를 들어드립니다 🌙</p>
  </header>

  <!-- ========== API 키 설정 섹션 ========== -->
  <!-- 사용자가 Gemini API 키를 입력하는 카드 형태의 섹션 -->
  <section id="api-key-section" class="api-key-section">
    <div class="api-key-card">
      <!-- 환영 아이콘 -->
      <div class="api-key-card__icon">🔑</div>

      <!-- 안내 문구 -->
      <h2 class="api-key-card__heading">시작하기 전에</h2>
      <p class="api-key-card__description">
        Gemini API 키를 입력해주세요
      </p>

      <!-- API 키 입력 필드 (비밀번호 형태로 가려짐) -->
      <input
        type="password"
        id="api-key-input"
        class="api-key-card__input"
        placeholder="Gemini API 키를 입력하세요"
        autocomplete="off"
      >

      <!-- API 키 발급 안내 링크 -->
      <p class="api-key-card__help">
        API 키가 없으신가요?
        <a
          href="https://aistudio.google.com/app/apikey"
          target="_blank"
          rel="noopener noreferrer"
        >
          여기서 무료로 발급받으세요 →
        </a>
      </p>

      <!-- 시작하기 버튼 -->
      <button id="start-btn" class="api-key-card__button">
        시작하기
      </button>
    </div>
  </section>

  <!-- ========== 채팅 영역 ========== -->
  <!-- 실제 상담 대화가 이루어지는 메인 영역 (초기에는 숨김) -->
  <section id="chat-section" class="chat-section" style="display: none;">

    <!-- 채팅 메시지 목록 (스크롤 가능한 영역) -->
    <div id="chat-messages" class="chat-messages">
      <!-- JavaScript가 여기에 메시지를 추가합니다 -->
    </div>

    <!-- 로딩 인디케이터 (상담사가 응답을 생성 중일 때 표시) -->
    <div id="loading" class="loading" hidden>
      <div class="loading__content">
        <span class="loading__text">상담사가 생각하고 있어요</span>
        <!-- 점 3개가 순차적으로 깜빡이는 애니메이션 -->
        <span class="loading__dots">
          <span class="loading__dot"></span>
          <span class="loading__dot"></span>
          <span class="loading__dot"></span>
        </span>
      </div>
    </div>

    <!-- 하단 입력 영역 -->
    <div class="chat-input-area">
      <div class="chat-input-area__inner">
        <!-- 사용자 메시지 입력 필드 -->
        <input
          type="text"
          id="user-input"
          class="chat-input-area__input"
          placeholder="마음속 이야기를 편하게 나눠주세요..."
          autocomplete="off"
        >
        <!-- 전송 버튼 -->
        <button id="send-btn" class="chat-input-area__send-btn" aria-label="메시지 전송">
          전송
        </button>
      </div>
    </div>
  </section>

  <!-- ========== 푸터 영역 ========== -->
  <!-- 페이지 하단 안내 문구 -->
  <footer class="footer">
    <p class="footer__text">당신은 혼자가 아닙니다 💛</p>
  </footer>

  <!-- ========== JavaScript 파일 ========== -->
  <!-- defer: HTML 파싱이 끝난 후 순서대로 실행 -->
  <!-- api.js를 먼저 로드하고, 그 다음 app.js를 로드 -->
  <script src="js/api.js" defer></script>
  <script src="js/app.js" defer></script>

</body>
</html>
